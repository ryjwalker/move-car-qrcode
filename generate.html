<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="输入手机号，一键生成挪车二维码">
  <title>生成挪车码</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <script src="phone.js"></script>
  <script src="qrcode.min.js"></script>
  <style>
    :root {
      --bg: #f4f1ec;
      --bg-accent: #e8e4dc;
      --surface: #ffffff;
      --text: #1c1917;
      --text-muted: #78716c;
      --primary: #1a6b5c;
      --primary-hover: #145548;
      --primary-soft: rgba(26, 107, 92, 0.1);
      --accent: #c17a2e;
      --accent-soft: rgba(193, 122, 46, 0.12);
      --danger: #b91c1c;
      --danger-soft: rgba(185, 28, 28, 0.08);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow-2: 0 8px 32px rgba(28, 25, 23, 0.08);
      --font-body: "Noto Sans SC", sans-serif;
      --font-display: "Noto Serif SC", serif;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, var(--primary-soft), transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, var(--accent-soft), transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 20px 40px;
    }

    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.625rem, 5.5vw, 2rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 8px;
      text-wrap: pretty;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      text-wrap: pretty;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid rgba(120, 113, 108, 0.08);
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .phone-input-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid var(--bg-accent);
      border-radius: var(--radius-md);
      background: var(--bg);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .phone-input-wrap:focus-within {
      border-color: var(--primary);
    }

    .phone-input-wrap.is-error {
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .phone-prefix {
      padding: 0 14px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      border-right: 1px solid var(--bg-accent);
      height: 52px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .phone-input {
      flex: 1;
      min-width: 0;
      height: 52px;
      padding: 0 14px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      outline: none;
    }

    .phone-input::placeholder {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0;
      color: #a8a29e;
    }

    .field-error {
      margin-top: 8px;
      font-size: 13px;
      color: var(--danger);
      display: none;
    }

    .field-error.show { display: block; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s var(--ease-out), filter 0.15s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn--primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 16px rgba(26, 107, 92, 0.25);
    }

    .btn--primary:hover:not(:disabled) { filter: brightness(1.06); }

    .btn--ghost {
      background: var(--bg);
      color: var(--primary);
      border: 1.5px solid rgba(26, 107, 92, 0.25);
    }

    .btn--ghost:hover { background: var(--primary-soft); }

    .result {
      display: none;
    }

    .result.show {
      display: block;
      animation: fadeUp 0.5s var(--ease-out) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .result-header h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-phone {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
    }

    .qr-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px;
      background: var(--bg);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }

    .qr-frame {
      padding: 14px;
      background: #fff;
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      width: 200px !important;
      height: 200px !important;
    }

    .qr-hint {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      text-wrap: pretty;
    }

    .url-box {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      text-align: center;
      padding: 10px 12px;
      background: var(--bg-accent);
      border-radius: var(--radius-sm);
      width: 100%;
      line-height: 1.5;
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
    }

    .nav-links a:hover { color: var(--primary); }

    @media (min-width: 480px) {
      .page { padding-top: 48px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="badge">免费生成</div>
    <h1>生成挪车二维码</h1>
    <p class="subtitle">输入您的手机号，生成专属挪车码。他人扫码后可联系您，无需暴露完整号码。</p>

    <section class="card">
      <form id="generateForm" novalidate>
        <div class="field">
          <label for="phoneInput">您的手机号码</label>
          <div class="phone-input-wrap" id="inputWrap">
            <span class="phone-prefix">+86</span>
            <input
              class="phone-input"
              id="phoneInput"
              type="tel"
              inputmode="numeric"
              maxlength="11"
              placeholder="请输入 11 位手机号"
              autocomplete="tel"
              required
            >
          </div>
          <p class="field-error" id="fieldError">请输入正确的 11 位中国大陆手机号</p>
        </div>
        <button class="btn btn--primary" type="submit" id="submitBtn">
          生成挪车二维码
        </button>
      </form>
    </section>

    <section class="card result" id="resultSection" aria-live="polite">
      <div class="result-header">
        <h2>您的挪车码已生成</h2>
        <p class="result-phone" id="resultPhone"></p>
      </div>

      <div class="qr-area">
        <div class="qr-frame">
          <div id="qrcode" role="img" aria-label="挪车二维码"></div>
        </div>
        <p class="qr-hint">他人扫码后将打开联系页，可一键拨号或发短信</p>
        <p class="url-box" id="contactUrl"></p>
      </div>

      <div class="action-stack">
        <a class="btn btn--primary" id="printLink" href="#">前往打印挪车卡</a>
        <a class="btn btn--ghost" id="previewLink" href="#" target="_blank" rel="noopener">预览扫码联系页</a>
        <button class="btn btn--ghost" type="button" id="regenerateBtn">更换手机号</button>
      </div>
    </section>

    <nav class="nav-links">
      <a href="owner.html">直接打印（默认号码）</a>
    </nav>
  </main>

  <script>
    (function () {
      var form = document.getElementById("generateForm");
      var phoneInput = document.getElementById("phoneInput");
      var inputWrap = document.getElementById("inputWrap");
      var fieldError = document.getElementById("fieldError");
      var resultSection = document.getElementById("resultSection");
      var resultPhone = document.getElementById("resultPhone");
      var qrcodeEl = document.getElementById("qrcode");
      var contactUrlEl = document.getElementById("contactUrl");
      var printLink = document.getElementById("printLink");
      var previewLink = document.getElementById("previewLink");
      var regenerateBtn = document.getElementById("regenerateBtn");

      var currentPhone = null;

      function showError(show) {
        inputWrap.classList.toggle("is-error", show);
        fieldError.classList.toggle("show", show);
      }

      function renderQr(phone) {
        var url = MoveCarPhone.buildContactUrl(phone);
        qrcodeEl.innerHTML = "";

        if (typeof QRCode === "undefined") {
          qrcodeEl.textContent = "二维码加载失败，请刷新";
          return;
        }

        try {
          new QRCode(qrcodeEl, {
            text: url,
            width: 200,
            height: 200,
            colorDark: "#1c1917",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } catch (e) {
          qrcodeEl.textContent = "二维码生成失败";
        }
      }

      function showResult(phone) {
        currentPhone = phone;
        var url = MoveCarPhone.buildContactUrl(phone);
        var ownerUrl = MoveCarPhone.buildOwnerUrl(phone);

        resultPhone.textContent = MoveCarPhone.formatPhone(phone, false);
        contactUrlEl.textContent = url;
        previewLink.href = url;
        printLink.href = ownerUrl;

        renderQr(phone);
        resultSection.classList.add("show");

        try {
          history.replaceState(null, "", "?p=" + phone);
        } catch (e) {}

        window.scrollTo({ top: resultSection.offsetTop - 20, behavior: "smooth" });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var phone = MoveCarPhone.normalizePhone(phoneInput.value);
        if (!phone) {
          showError(true);
          phoneInput.focus();
          return;
        }
        showError(false);
        showResult(phone);
      });

      phoneInput.addEventListener("input", function () {
        phoneInput.value = phoneInput.value.replace(/\D/g, "").slice(0, 11);
        if (phoneInput.value.length > 0) showError(false);
      });

      regenerateBtn.addEventListener("click", function () {
        resultSection.classList.remove("show");
        phoneInput.value = "";
        phoneInput.focus();
        try {
          history.replaceState(null, "", window.location.pathname);
        } catch (e) {}
      });

      var fromUrl = MoveCarPhone.getPhoneFromUrl();
      if (fromUrl) {
        phoneInput.value = fromUrl;
        showResult(fromUrl);
      }
    })();
  </script>
</body>
</html>
